name: CrashCue CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        node: [20]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Verify Node Version
        run: node -v

      - name: Install Dependencies
        run: npm ci

      - name: Verify Mandatory Default Asset Exists
        run: |
          if (!(Test-Path "assets/faahhhhhh.wav")) {
            Write-Error "Mandatory default WAV asset missing."
            exit 1
          }

      - name: Build Project
        run: npm run build

      - name: Smoke Test Packaged CLI
        run: |
          npm pack
          $pkg = Get-ChildItem crashcue-*.tgz | Select-Object -First 1
          npm install -g $pkg.Name
          crashcue --help
          crashcue test

      - name: Run Tests with Coverage Enforcement
        run: npm test

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage
