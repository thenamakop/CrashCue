name: CrashCue CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        node: [20]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Verify Node Version
        run: node -v

      - name: Install Dependencies
        run: npm ci

      - name: Verify Mandatory Default Asset Exists
        run: |
          if (-Not (Test-Path "packages/shared-assets/assets/faahhhhhh.wav")) {
            Write-Error "Mandatory default WAV asset missing at packages/shared-assets/assets/faahhhhhh.wav"
            exit 1
          }

      - name: Build Project
        run: npm run build

      - name: Pack CLI
        shell: pwsh
        run: |
          cd packages/cli
          Remove-Item crashcue-*.tgz -Force -ErrorAction SilentlyContinue
          npm pack

      - name: Install CLI Globally
        shell: pwsh
        run: |
          cd packages/cli
          $pkg = Get-ChildItem crashcue-*.tgz | Select-Object -First 1
          if (-not $pkg) {
            Write-Error "No CLI tarball found"
            exit 1
          }

          npm uninstall -g crashcue 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "crashcue was not previously installed (ok)"
          }

          npm install -g $pkg.FullName
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Global install failed"
            exit 1
          }

          Get-Command crashcue -ErrorAction Stop | Out-Null

      - name: Smoke Test CLI
        shell: pwsh
        run: |
          crashcue --version
          crashcue --help
          crashcue doctor --report
          crashcue test

      - name: Run Tests with Coverage Enforcement
        run: npm test

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage
