name: CrashCue CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        node: [20]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Verify Node Version
        run: node -v

      - name: Install Dependencies
        run: npm ci

      - name: Verify Mandatory Default Asset Exists
        run: |
          if (-Not (Test-Path "packages/shared-assets/assets/faahhhhhh.wav")) {
            Write-Error "Mandatory default WAV asset missing at packages/shared-assets/assets/faahhhhhh.wav"
            exit 1
          }

      - name: Build CLI
        run: npm run build -w packages/cli

      - name: Build VSCode Extension
        run: |
          Push-Location packages/vscode-extension
          npm install
          npm run build
          Pop-Location

      - name: Pack CLI
        shell: pwsh
        run: |
          npm run verify:cli-pack
          cd packages/cli
          Remove-Item crashcue-*.tgz -Force -ErrorAction SilentlyContinue
          npm pack

      - name: Install CLI Globally
        shell: pwsh
        run: |
          cd packages/cli
          $pkg = Get-ChildItem crashcue-*.tgz | Select-Object -First 1
          if (-not $pkg) {
            Write-Error "No CLI tarball found"
            exit 1
          }

          npm uninstall -g crashcue 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "crashcue was not previously installed (ok)"
          }

          npm install -g $pkg.FullName
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Global install failed"
            exit 1
          }

          Get-Command crashcue -ErrorAction Stop | Out-Null

      - name: Smoke Test CLI
        shell: pwsh
        run: |
          crashcue --version
          crashcue --help
          crashcue doctor --report
          crashcue test

      - name: Package VSCode Extension (VSIX)
        shell: pwsh
        run: |
          Push-Location packages/vscode-extension
          Remove-Item crashcue-vscode-*.vsix -Force -ErrorAction SilentlyContinue
          npx --yes @vscode/vsce package
          Pop-Location

      - name: Verify VSIX Is Isolated (No node_modules)
        shell: pwsh
        run: |
          Push-Location packages/vscode-extension
          $vsix = Get-ChildItem crashcue-vscode-*.vsix | Select-Object -First 1
          if (-not $vsix) {
            Write-Error "No VSIX produced"
            exit 1
          }

          $outDir = Join-Path $env:RUNNER_TEMP "crashcue-vsix"
          Remove-Item $outDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $outDir | Out-Null
          Expand-Archive -Path $vsix.FullName -DestinationPath $outDir -Force

          if (Test-Path (Join-Path $outDir "extension/node_modules")) {
            Write-Error "node_modules leaked into VSIX"
            exit 1
          }

          $expected = @(
            "extension/dist/extension.js",
            "extension/package.json",
            "extension/readme.md",
            "extension/LICENSE.txt"
          )
          foreach ($p in $expected) {
            if (-not (Test-Path (Join-Path $outDir $p))) {
              Write-Error "Missing expected file in VSIX: $p"
              exit 1
            }
          }

          $disallowed = @(
            "extension/src",
            "extension/tests",
            "extension/tsconfig.json"
          )
          foreach ($p in $disallowed) {
            if (Test-Path (Join-Path $outDir $p)) {
              Write-Error "Disallowed path present in VSIX: $p"
              exit 1
            }
          }

          Remove-Item $vsix.FullName -Force
          Pop-Location

      - name: Run Tests with Coverage Enforcement
        run: npm test

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage
